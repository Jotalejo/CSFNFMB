{% extends "layout.html" %}

{% block content %}

<div class="section-body">
<div class="container-fluid">

<div class="row clearfix">

<div class="col-md-12">

<div class="card">

<div class="card-header">

<h3 class="card-title">
Pesaje y Clasificación
</h3>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-2">
<label>Fecha</label>

<input
type="date"
id="fecha"
class="form-control">

</div>

<div class="col-md-2">

<label>Placa</label>

<select
id="vehiculo"
class="form-control">

<option value="">Seleccione...</option>

</select>

</div>

<div class="col-md-4">

<label>Cliente</label>

<select
id="cliente"
class="form-control">

<option value="">Seleccione...</option>

</select>

</div>

<div class="col-md-4">

<label>Manifiesto</label>

<select
id="recoleccion"
class="form-control">

<option value="">Seleccione...</option>

</select>

</div>

</div>

<br>

<div class="table-responsive">

<table
id="tblDetalle"
class="table table-striped table-hover">

<thead>

<tr>

<th>Tipo de Residuo</th>

<th width="120">Bolsas</th>

<th width="120">Kg</th>

<th width="120">Confirmado</th>

<th>Observación</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<div class="row">

<div class="col-md-12 text-right">

<button
id="btnGuardar"
class="btn btn-primary">

Guardar Pesaje

</button>

<hr>

<div class="card mt-3">
    <div class="card-header">
        <h3 class="card-title">Reporte de Acumulados</h3>
    </div>

    <div class="card-body">
        <div class="row">
            <div class="col-md-3">
                <label>Fecha base</label>
                <input type="date" id="rep_fecha" class="form-control">
            </div>

            <div class="col-md-3 d-flex align-items-end">
                <button type="button" id="btnReporteAcumulados" class="btn btn-outline-primary">
                    Generar reporte
                </button>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button type="button" id="btnImprimirReporte" class="btn btn-outline-secondary">
                    Imprimir reporte
                </button>
            </div>
        </div>

        <br>

        <div id="reporteAcumulados"></div>
    </div>
</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

{% endblock %}

{% block scripts %}

<script src="/static/js/pesaje.js"></script>

{% endblock %}
