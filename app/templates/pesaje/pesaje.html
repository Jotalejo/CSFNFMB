{% extends "layout.html" %}

{% block content %}

<div class="section-body">
<div class="container-fluid">

<div class="row clearfix">

<div class="col-md-12">

<div class="card">

<div class="card-header">

<h3 class="card-title">
Pesaje y Clasificación
</h3>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-2">
<label>Fecha</label>

<input
type="date"
id="fecha"
class="form-control">

</div>

<div class="col-md-2">

<label>Placa</label>

<select
id="vehiculo"
class="form-control">

<option value="">Seleccione...</option>

</select>

</div>

<div class="col-md-4">

<label>Cliente</label>

<select
id="cliente"
class="form-control">

<option value="">Seleccione...</option>

</select>

</div>

<div class="col-md-4">

<label>Manifiesto</label>

<select
id="recoleccion"
class="form-control">

<option value="">Seleccione...</option>

</select>

</div>

</div>

<br>

<div class="table-responsive">

<table
id="tblDetalle"
class="table table-striped table-hover">

<thead>

<tr>

<th>Tipo de Residuo</th>

<th width="120">Bolsas</th>

<th width="120">Kg</th>

<th width="120">Confirmado</th>

<th>Observación</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<div class="row">

<div class="col-md-12 text-right">

<button
id="btnGuardar"
class="btn btn-primary">

Guardar Pesaje

</button>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

{% endblock %}

{% block scripts %}

<script src="/static/js/pesaje.js"></script>

{% endblock %}
